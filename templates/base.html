<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SkinScan AI{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="app-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <i class="fa-solid fa-square-plus"></i>
            <span>SCancer</span>
        </div>
        
        <div class="sidebar-nav">
            <a href="/dashboard" class="nav-item {% if request.path == '/dashboard' %}active{% endif %}">
                <i class="fa-solid fa-chart-pie"></i>
                <span>Dashboard</span>
            </a>
            
            <a href="/predict" class="nav-item {% if request.path == '/predict' %}active{% endif %}">
                <i class="fa-solid fa-circle-plus"></i>
                <span>Nouvelle Analyse</span>
            </a>
            
            <a href="/patients" class="nav-item {% if request.path == '/patients' %}active{% endif %}">
                <i class="fa-solid fa-user-group"></i>
                <span>Liste Patients</span>
            </a>
        </div>
        
        <div style="padding: 20px;">
            <a href="/logout" class="nav-item" style="color: var(--text-muted);">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
                <span>Déconnexion</span>
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="mb-4">
                {% for cat, msg in messages %}
                    <div class="alert alert-{{ cat }} alert-custom alert-dismissible fade show">
                        {{ msg }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
