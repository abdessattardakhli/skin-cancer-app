<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - SCancer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">

<div class="login-card">
    <div class="login-icon">
        <i class="fa-solid fa-user-plus"></i>
    </div>
    
    <h2 class="login-title">SCancer</h2>
    <p class="login-subtitle">Créer un nouveau compte praticien</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }} alert-custom">{{ msg }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="input-group-custom">
            <i class="fa-solid fa-user"></i>
            <input type="text" name="username" placeholder="Nom d'utilisateur" required>
        </div>
        
        <div class="input-group-custom">
            <i class="fa-solid fa-lock"></i>
            <input type="password" name="password" placeholder="Mot de passe" required>
        </div>
        
        <button type="submit" class="btn-primary-custom">
            <i class="fa-solid fa-check"></i> S'inscrire
        </button>
    </form>
    
    <div class="login-footer">
        <p>Vous avez déjà un compte ? <a href="/" style="color: var(--primary-color); font-weight: bold; text-decoration: none;">Se connecter</a></p>
    </div>
</div>

</body>
</html>
